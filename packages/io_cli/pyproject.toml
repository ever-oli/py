[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "io-cli"
version = "0.1.0"
description = "IO CLI - Hermes/Pi/Python Hybrid"
readme = "README.md"
requires-python = ">=3.10"
license = { text = "MIT" }
authors = [
    { name = "IO Team" }
]
keywords = ["cli", "ai", "agent", "coding"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
]
dependencies = [
    "pyyaml>=6.0",
    "croniter>=2.0",
    "httpx>=0.27",
    "fastapi>=0.110",
    "uvicorn>=0.29",
]

[project.optional-dependencies]
full = [
    "pi-coding-agent",
    "pi-pods",
    "fastapi>=0.110",
    "websockets>=12.0",
    "rich>=13.0",
]

[project.scripts]
io = "io_cli.cli:main"

[project.urls]
Homepage = "https://github.com/ever-oli/py"
Repository = "https://github.com/ever-oli/py"

[tool.hatch.build.targets.wheel]
packages = ["src/io_cli"]

[tool.hatch.metadata]
allow-direct-references = true
