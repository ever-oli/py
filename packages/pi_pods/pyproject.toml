[build-system]
requires = ["hatchling>=1.18.0"]
build-backend = "hatchling.build"

[project]
name = "pi-pods"
version = "0.1.0"
description = "Container and Pod Management for Pi Ecosystem"
readme = "README.md"
license = {text = "MIT"}
requires-python = ">=3.11"
authors = [
    {name = "Pi Team", email = "team@pi.dev"},
]
keywords = ["pi", "pods", "containers", "vllm", "gpu"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
]
dependencies = [
    "pi-agent-core>=0.1.0",
    "pydantic>=2.0",
    "httpx>=0.27",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "pytest-cov>=4.1",
    "mypy>=1.8",
    "ruff>=0.3.0",
]

[project.scripts]
pi = "pi_pods.cli:main"

[tool.hatch.build.targets.wheel]
packages = ["src/pi_pods"]

[tool.hatch.version]
path = "src/pi_pods/__init__.py"