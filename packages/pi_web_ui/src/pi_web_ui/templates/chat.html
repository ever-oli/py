<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pi Web UI</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
</head>
<body>
    <div id="app">
        <!-- Sidebar -->
        <aside id="sidebar" class="sidebar">
            <div class="sidebar-header">
                <h1>Pi Web UI</h1>
                <button id="new-chat-btn" class="btn btn-primary">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
                    New Chat
                </button>
            </div>
            <div id="session-list" class="session-list">
                <!-- Sessions will be populated here -->
            </div>
            <div class="sidebar-footer">
                <button id="settings-btn" class="btn btn-ghost">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.1a2 2 0 0 1-1-1.72v-.51a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>
                    Settings
                </button>
            </div>
        </aside>

        <!-- Main Chat Area -->
        <main id="main" class="main">
            <!-- Messages Container -->
            <div id="messages-container" class="messages-container">
                <div id="messages" class="messages">
                    <!-- Messages will be rendered here -->
                </div>
                <div id="streaming-message" class="streaming-message hidden">
                    <!-- Streaming content appears here -->
                </div>
            </div>

            <!-- Input Area -->
            <div class="input-area">
                <div id="attachments-preview" class="attachments-preview hidden">
                    <!-- Attachment previews appear here -->
                </div>
                <div class="input-row">
                    <button id="attach-btn" class="btn btn-ghost btn-icon" title="Attach file">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m21.44 11.05-9.19 9.19a6 6 0 0 1-8.49-8.49l8.57-8.57A4 4 0 1 1 18 8.84l-8.59 8.57a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
                    </button>
                    <div class="textarea-container">
                        <textarea 
                            id="message-input" 
                            class="message-input" 
                            placeholder="Type a message..."
                            rows="1"
                        ></textarea>
                    </div>
                    <button id="model-selector-btn" class="btn btn-ghost btn-sm">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/></svg>
                        <span id="current-model">GPT-4o</span>
                    </button>
                    <button id="send-btn" class="btn btn-primary btn-icon">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m22 2-7 20-4-9-9-4 20-7z"/></svg>
                    </button>
                    <button id="abort-btn" class="btn btn-destructive btn-icon hidden">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="14" height="14" x="5" y="5"/></svg>
                    </button>
                </div>
                <div class="input-footer">
                    <span id="token-stats" class="token-stats"></span>
                </div>
            </div>
        </main>

        <!-- Model Selector Modal -->
        <div id="model-modal" class="modal hidden">
            <div class="modal-overlay"></div>
            <div class="modal-content">
                <div class="modal-header">
                    <h2>Select Model</h2>
                    <button class="modal-close">&times;</button>
                </div>
                <div id="model-list" class="model-list">
                    <!-- Models will be populated here -->
                </div>
            </div>
        </div>

        <!-- Hidden file input -->
        <input type="file" id="file-input" multiple accept="image/*,.pdf,.docx,.txt,.md,.json,.xml,.html,.css,.js,.ts,.yml,.yaml" style="display: none;">
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
