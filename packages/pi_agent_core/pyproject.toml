[build-system]
requires = ["hatchling>=1.18.0"]
build-backend = "hatchling.build"

[project]
name = "pi-agent-core"
version = "0.1.0"
description = "Core agent framework and abstractions for Pi ecosystem"
readme = "README.md"
license = {text = "MIT"}
requires-python = ">=3.11"
authors = [
    {name = "Pi Team", email = "team@pi.dev"},
]
keywords = ["pi", "agent", "core", "framework"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
]
dependencies = [
    "pi-ai",
    "pydantic>=2.0",
    "typing-extensions>=4.8",
    "structlog>=24.1",
    "anyio>=4.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "pytest-cov>=4.1",
    "mypy>=1.8",
    "ruff>=0.3.0",
]

[project.scripts]
pi-agent-core = "pi_agent_core.cli:main"

[tool.hatch.build.targets.wheel]
packages = ["src/pi_agent_core"]

[tool.hatch.version]
path = "src/pi_agent_core/__init__.py"
