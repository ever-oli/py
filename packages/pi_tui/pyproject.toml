[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "pi-tui"
version = "0.1.0"
description = "Terminal UI library with differential rendering for Python"
readme = "README.md"
requires-python = ">=3.9"
license = {text = "MIT"}
authors = [
    {name = "Pi Mono Team"},
]
keywords = ["terminal", "tui", "ui", "console", "cli"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Environment :: Console",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Topic :: Terminals",
]

[project.urls]
Homepage = "https://github.com/pi-mono/pi-tui"
Repository = "https://github.com/pi-mono/pi-tui"
Issues = "https://github.com/pi-mono/pi-tui/issues"

[tool.hatch.build.targets.wheel]
packages = ["src/pi_tui"]

[tool.ruff]
target-version = "py39"
line-length = 120
select = ["E", "F", "W", "I", "N", "D", "UP", "B", "C4", "SIM"]
ignore = ["D100", "D104", "D107"]

[tool.ruff.pydocstyle]
convention = "google"

[tool.mypy]
python_version = "3.9"
strict = true
warn_return_any = true
warn_unused_configs = true
show_error_codes = true

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_functions = ["test_*"]
addopts = "-v --tb=short"
