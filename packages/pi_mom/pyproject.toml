[build-system]
requires = ["hatchling>=1.18.0"]
build-backend = "hatchling.build"

[project]
name = "pi-mom"
version = "0.1.0"
description = "Slack Bot for Pi Ecosystem"
readme = "README.md"
license = {text = "MIT"}
requires-python = ">=3.11"
authors = [
    {name = "Pi Team", email = "team@pi.dev"},
]
keywords = ["pi", "slack", "bot", "agent"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
]
dependencies = [
    "pi-agent-core>=0.1.0",
    "slack-sdk>=3.27.0",
    "aiohttp>=3.9.0",
    "aiofiles>=23.0",
    "httpx>=0.27",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "pytest-cov>=4.1",
    "mypy>=1.8",
    "ruff>=0.3.0",
]

[project.scripts]
pi-mom = "pi_mom.cli:main"

[tool.hatch.build.targets.wheel]
packages = ["src/pi_mom"]

[tool.hatch.version]
path = "src/pi_mom/__init__.py"