[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "pi-ai"
version = "0.1.0"
description = "Python port of pi-mono TypeScript AI package - LLM provider abstraction layer"
readme = "README.md"
license = "MIT"
requires-python = ">=3.11"
authors = [
    { name = "pi-mono-python" },
]
keywords = ["llm", "ai", "openai", "anthropic", "openrouter", "streaming"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
]
dependencies = [
    "httpx>=0.27.0",
    "pydantic>=2.0.0",
]

[project.optional-dependencies]
bedrock = [
    "boto3>=1.34.0",
]
dev = [
    "pytest>=8.0.0",
    "pytest-asyncio>=0.23.0",
    "mypy>=1.8.0",
    "ruff>=0.3.0",
]

[project.urls]
Homepage = "https://github.com/pi-mono-python/pi-ai"
Repository = "https://github.com/pi-mono-python/pi-ai"
Issues = "https://github.com/pi-mono-python/pi-ai/issues"

[tool.hatch.build.targets.wheel]
packages = ["src/pi_ai"]

[tool.ruff]
target-version = "py311"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "I", "N", "W", "UP", "B", "C4", "SIM"]
ignore = ["E501"]

[tool.mypy]
python_version = "3.11"
strict = true
warn_return_any = true
warn_unused_ignores = true

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]